name: Bug Report
description: Create a report to help improve NotifyX
title: "[BUG] "
labels: ["type: bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      description: Which service is this bug related to?
      options:
        - Gateway
        - Auth Service
        - Notification Service
        - Delivery Worker
        - Audit Service
        - Analytics Service
        - Admin Service
        - Shared Package (@notifyx/shared)
        - Other / Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      value: |
        1. Send request to '...'
        2. With payload '...'
        3. See error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste any relevant logs or error messages.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: node
    attributes:
      label: Node.js version
      options:
        - "22.x"
        - "20.x"
        - Other
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Local (npm run dev)
        - Cloud / VPS
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or information that might help.
    validations:
      required: false
